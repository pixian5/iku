name: VPS Daily Run

on:
  schedule:
    # 每天 11:30 (UTC 3:30)
    - cron: '30 3 * * *'
    # 每天 17:30 (UTC 9:30)
    - cron: '30 9 * * *'
    # 每天 23:30 (UTC 15:30)
    - cron: '30 15 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  run-task:
    runs-on: ubuntu-latest
    env:
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run task
        run: |
          echo "开始执行任务..."
          echo "用户名: $USERNAME"
          # 在这里添加你的实际任务
          # 例如: python3 checkin.py
          echo "任务执行完成"

      - name: Push notification
        if: always()
        run: |
          TITLE=$(python3 -c "import urllib.parse; print(urllib.parse.quote('VPS任务完成'))")
          CONTENT=$(python3 -c "import urllib.parse; print(urllib.parse.quote('任务已于$(date +%Y-%m-%d\ %H:%M:%S)执行完成'))")
          curl -s "https://api.day.app/8kSTPbxDxoRtzezBT84nQj/${TITLE}/${CONTENT}"
